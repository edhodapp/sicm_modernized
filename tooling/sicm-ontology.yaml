# --------------------------------------------------------------------
# mathematical_objects — first-class objects in the formalism.
#
# Phase 1 scope: classical mechanics. We bootstrap with the three
# objects that anchor the action-principle keystone (PROJECT_NOTES.md
# §10): action, Lagrangian, Hamiltonian. The action is THE central
# object across all four phases (classical, GR, QM, field theory) so
# it lands first; L and H follow as the variational and canonical
# pictures of classical mechanics.
# --------------------------------------------------------------------
mathematical_objects:
  - name: action
    description: |
      The action functional S = integral of L dt evaluated along a
      path q(t). The single most important object in this project:
      classical mechanics stationarizes it, path-integral QM sums
      over it, GR stationarizes it on a spacetime manifold, field
      theory generalizes it to spacetime integrals. PROJECT_NOTES.md
      §10 names this the architectural keystone of the whole arc.
    status: spec
    decision_refs: [D001]
    latex_repr: "S = int L dt"
    domain: "path_space"
    phase: classical

  - name: lagrangian
    description: |
      The Lagrangian function L(q, qdot, t) on the tangent bundle of
      configuration space. Integrand of the action. Subject of the
      Euler-Lagrange variational principle.
    status: spec
    decision_refs: [D001]
    latex_repr: "L(q, qdot, t)"
    domain: "tangent_bundle"
    phase: classical

  - name: hamiltonian
    description: |
      The Hamiltonian function H(q, p, t) on the cotangent bundle.
      Legendre-transform image of the Lagrangian. Generates the
      symplectic Hamiltonian flow on phase space.
    status: spec
    decision_refs: [D001]
    latex_repr: "H(q, p, t)"
    domain: "cotangent_bundle"
    phase: classical

# --------------------------------------------------------------------
# mathematical_relations — equations and transforms.
# --------------------------------------------------------------------
mathematical_relations:
  - name: euler_lagrange
    description: |
      The Euler-Lagrange equations: stationary-action condition delta
      S = 0 yields d/dt(dL/dqdot) - dL/dq = 0, i.e., the equations of
      motion in Lagrangian form.
    status: spec
    decision_refs: [D001]
    latex_repr: "d/dt (dL/dqdot) - dL/dq = 0"
    kind: variational
    phase: classical
    appears_in: [lagrangian, action]

  - name: legendre_transform
    description: |
      The Legendre transform L -> H taking Lagrangian to Hamiltonian
      via p := dL/dqdot and H(q, p, t) := p qdot - L(q, qdot, t).
      Bridges the tangent-bundle and cotangent-bundle pictures of
      classical mechanics.
    status: spec
    decision_refs: [D001]
    latex_repr: "H = p qdot - L"
    kind: transform
    phase: classical
    appears_in: [lagrangian]
    derives_to: [hamiltonian]

# --------------------------------------------------------------------
# invariants — what the numerical methods must conserve.
# --------------------------------------------------------------------
invariants:
  - name: energy_conservation
    description: |
      For a time-independent Hamiltonian, the value H(q(t), p(t)) is
      conserved along the flow. Symplectic integrators conserve a
      modified Hamiltonian exactly and the true H to bounded drift
      over exponentially long times — both forms are valuable as
      verification cases.
    status: spec
    decision_refs: [D001]
    bound_type: bounded_drift
    noether_origin: "time_translation_symmetry"
    phase: classical

  - name: symplectic_2_form
    description: |
      The symplectic 2-form omega = dq wedge dp on phase space.
      Preserved by the Hamiltonian flow; symplectic integrators
      preserve a discrete analogue. The defining structure that makes
      a numerical method 'symplectic' rather than merely accurate.
    status: spec
    decision_refs: [D001, D003]
    bound_type: exact
    noether_origin: "phase_space_volume_preservation"
    phase: classical

